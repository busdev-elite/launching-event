<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Launching - Authorized Dealer</ELITE INTERNATIONAL>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Gaya Desain Minimalis & Mewah (Tema Gelap) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0c0c0c;
            color: #ffffff;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        header {
            text-align: center;
            padding: 80px 20px;
            border-bottom: 1px solid #222;
        }
        .badge {
            background-color: #c5a880; /* Warna Emas */
            color: #000;
            padding: 6px 15px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }
        .event-subtitle {
            font-size: 18px;
            color: #c5a880;
            margin-bottom: 40px;
        }
        section {
            padding: 60px 0;
            border-bottom: 1px solid #1a1a1a;
        }
        h2 {
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #c5a880;
            margin-bottom: 30px;
            position: relative;
        }
        /* Visi Misi */
        .vision-mission p {
            font-size: 16px;
            color: #ccc;
            margin-bottom: 20px;
        }
        /* Brands Grid */
        .brand-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }
        .brand-card {
            background-color: #121212;
            border: 1px solid #222;
            padding: 25px;
            text-align: center;
            border-radius: 8px;
            transition: 0.3s;
        }
        .brand-card:hover {
            border-color: #c5a880;
        }
        .brand-card h3 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 1px;
        }
        /* Rundown Timeline */
        .timeline {
            list-style: none;
            position: relative;
            padding-left: 20px;
            border-left: 1px solid #c5a880;
        }
        .timeline-item {
            margin-bottom: 30px;
            position: relative;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -25px;
            top: 5px;
            background: #c5a880;
            width: 9px;
            height: 9px;
            border-radius: 50%;
        }
        .time {
            font-weight: 700;
            color: #c5a880;
            font-size: 14px;
        }
        .activity {
            font-size: 16px;
            color: #ddd;
            margin-top: 5px;
        }
        /* Venue & Maps */
        .venue-details {
            margin-bottom: 25px;
            color: #ccc;
        }
        .map-container {
            border: 1px solid #222;
            border-radius: 8px;
            overflow: hidden;
        }
        footer {
            text-align: center;
            padding: 40px 0;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header>
            <span class="badge">Exclusive Invitation</span>
            <h1>Grand Launching</h1>
            <p class="event-subtitle">Authorized Dealer Celebration</p>
        </header>

        <!-- Visi & Misi -->
        <section class="vision-mission">
            <h2>Visi & Misi</h2>
            <p><strong>Visi:</strong> Menjadi mitra ritel tepercaya yang menghadirkan jam tangan mewah dengan standar layanan terpercaya dan jaminan keaslian 100%.</p>
            <p><strong>Misi:</strong> Memperluas jangkauan akses koleksi jam tangan premium global di Indonesia, serta memberikan pengalaman berbelanja eksklusif yang tak terlupakan bagi setiap pelanggan.</p>
        </section>

        <!-- Brands Showcase -->
        <section>
            <h2>Merek yang Ditampilkan</h2>
            <div class="brand-grid">
                <div class="brand-card"><h3>Christian Bernard</h3></div>
                <div class="brand-card"><h3>Bentley</h3></div>
                <div class="brand-card"><h3>Maserati</h3></div>
                <div class="brand-card"><h3>Condotti</h3></div>
                <div class="brand-card"><h3>Elle</h3></div>
                <div class="brand-card"><h3>Wish</h3></div>
            </div>
        </section>

        <!-- Rundown Acara -->
        <section>
            <h2>Rundown Acara</h2>
            <ul class="timeline">
                <li class="timeline-item">
                    <div class="time">15:00 - 15:30</div>
                    <div class="activity">Registrasi Tamu Undangan & Welcoming Drink</div>
                </li>
                <li class="timeline-item">
                    <div class="time">15:30 - 15:45</div>
                    <div class="activity">Opening Ceremony & Speech (Grand Launching)</div>
                </li>
                <li class="timeline-item">
                    <div class="time">15:45 - 16:30</div>
                    <div class="activity">Eksplorasi Galeri Produk & Pengenalan Koleksi Eksklusif</div>
                </li>
                <li class="timeline-item">
                    <div class="time">16:30 - 17.00</div>
                    <div class="activity">Entertainment Show</div>
                </li>
                <li class="timeline-item">
                    <div class="time">17:00 - selesai</div>
                    <div class="activity">Ramah Tamah & Makan Malam</div>              
            </ul>
        </section>

        <!-- Venue & Lokasi -->
        <section>
            <h2>Waktu & Tempat</h2>
            <div class="venue-details">
                <p><strong>Tanggal:</strong> Rabu, 13 Agustus 2026</p>
                <p><strong>Lokasi:</strong> Ballroom Whistler Garden PIK 2</p>
            </div>
            <div class="map-container">
                <!-- Masukkan link Google Maps embed Anda di bawah ini -->
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3967.622868375768!2d106.7058351!3d-6.0463684!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2e6a05006bb0fdc9%3A0x78d40628426cbdbd!2sWhistler%20Garden!5e0!3m2!1sid!2sid!4v1784086288720!5m2!1sid!2sid" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="strict-origin-when-cross-origin"></iframe>" width="100%" height="350" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </section>

        <!-- Footer -->
        <footer>
            <p>&copy; 2026 Authorized Dealer Launching Event. All Rights Reserved.</p>
        </footer>
    </div>

</body>
</html>
