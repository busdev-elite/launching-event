<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maserati Product Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'League Spartan', 'Futura', sans-serif;
            background-color: #0c0c0c;
            color: #ffffff;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .catalog-title {
            text-align: center;
            font-size: 28px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #800020; /* Maroon */
            margin-bottom: 30px;
            font-weight: 700;
        }
        .wrapper {
            width: 100%;
            max-width: 900px;
        }
        .catalog-footer {
            margin-top: 20px;
            font-size: 14px;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .catalog-footer a {
            color: #800020; /* Teks Canva menjadi Maroon */
            text-decoration: none;
            font-weight: 600;
        }
        .catalog-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1 class="catalog-title">Maserati Collection Catalog</h1>

    <div class="wrapper">
        <!-- Kode Embed Resmi dari Canva Anda -->
        <div style="position: relative; width: 100%; height: 0; padding-top: 56.2500%; padding-bottom: 0; box-shadow: 0 2px 8px 0 rgba(0,0,0,0.5); overflow: hidden; border-radius: 8px; will-change: transform; border: 1px solid #800020;">
            <iframe loading="lazy" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none; padding: 0; margin: 0;"
                src="https://www.canva.com/design/DAHPbUg6X8g/mNQH5AX6h38QYO-KstHP5A/view?embed" allowfullscreen="allowfullscreen" allow="fullscreen">
            </iframe >
        </div>

        <div class="catalog-footer">
            <a href="https://www.canva.com/design/DAHPbUg6X8g/mNQH5AX6h38QYO-KstHP5A/view?utm_content=DAHPbUg6X8g&amp;utm_campaign=designshare&amp;utm_medium=embeds&amp;utm_source=link" target="_blank" rel="noopener">Velocità Collection</a> by Elite International
        </div>
    </div>

</body>
</html>
