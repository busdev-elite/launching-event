<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maserati Product Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'League Spartan', 'Futura', sans-serif;
            background-color: #0c0c0c;
            color: #ffffff;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .catalog-title {
            text-align: center;
            font-size: 28px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #800020; /* Maroon */
            margin-bottom: 30px;
            font-weight: 700;
        }
        /* Kontainer Iframe untuk Canva */
        .canva-embed-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16/9; /* Sesuaikan dengan rasio desain Canva Anda (misal 16:9 atau 1:1) */
            border: 1px solid #800020;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(128, 0, 32, 0.15);
        }
        .canva-embed-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .catalog-footer {
            margin-top: 30px;
            font-size: 14px;
            color: #800020;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <h1 class="catalog-title">Maserati Collection Catalog</h1>

    <!-- Area Embed Canva -->
    <div class="canva-embed-container">
        <!-- Taruh KODE EMBED (Bukan Link Biasa) dari Canva di bawah ini -->
        <iframe loading="lazy" src="https://www.canva.com/design/DAHPbUg6X8g/mNQH5AX6h38QYO-KstHP5A/view" allowfullscreen="allowfullscreen" allow="fullscreen"></iframe>
    </div>

    <div class="catalog-footer">Elite International Exclusive Gallery</div>

</body>
</html>
